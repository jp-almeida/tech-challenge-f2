services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.3.2
    command: >
      mlflow server --host 0.0.0.0 --port 5001
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5001:5001"
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 12

  training_job:
    build: .
    depends_on:
      mlflow:
        condition: service_healthy

    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5001

    volumes:
      - .:/app
      - mlflow_data:/mlflow

volumes:
  mlflow_data:
