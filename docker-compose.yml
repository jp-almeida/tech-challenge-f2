services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.3.2
    command: >
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 12

  training_job:
    build: .
    depends_on:
      mlflow:
        condition: service_healthy
    command: >
      sh -c "dvc repro"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
      - mlflow_data:/mlflow

volumes:
  mlflow_data:
